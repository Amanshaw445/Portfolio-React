    <script>
      // SEO Friendly Title Logic
      const originalTitle = "Aman Shaw | Frontend Developer";
      const emojis = ["🥺 Come back!", "😾 Come back na!", "😤😤 uffff"];
      let i = 0;
      let interval;

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          interval = setInterval(() => {
            document.title = emojis[i % emojis.length];
            i++;
          }, 1000);
        } else {
          clearInterval(interval);
          document.title = originalTitle;
        }
      });
    </script>
